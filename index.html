<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Pipeline Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Jenkins CI/CD Pipeline</h1>
        <p>This page is deployed using Jenkins, Git, and Nginx!</p>
        <div class="info">
            <h2>Pipeline Stages:</h2>
            <ul>
                <li>✅ Clone from Git</li>
                <li>✅ Build</li>
                <li>✅ Deploy on Nginx</li>
                <li>✅ Display HTML</li>
            </ul>
        </div>
        <p><strong>Deployed at:</strong> <span id="timestamp"></span></p>
    </div>
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
